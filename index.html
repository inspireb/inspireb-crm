<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InspireB — Suivi client</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/clear-sans@5.2.5/400.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/clear-sans@5.2.5/500.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/clear-sans@5.2.5/700.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --sage:#a8cbb7; --sage-deep:#43584b; --sage-mid:#5b7263; --sage-soft:#e7f0ea;
  --cream:#f6f6e9; --gold:#e6be8a; --gold-soft:#f6ecd9; --rust:#ab4210; --rust-2:#c46a3c; --rose:#b76666;
  --plum:var(--sage-deep); --plum-2:var(--sage-mid); --violet:var(--rust); --violet-2:var(--rust-2); --violet-soft:var(--sage-soft);
  --card:#fffef8; --ink:#2b2f28; --muted:#78806f; --line:#e1e3d0;
  --ok:#5f8a70; --ok-soft:#e7f0ea; --warn:#a3752c; --warn-soft:#f6ecd9; --err:#b76666; --err-soft:#f6e5e5;
  --r:14px; --shadow:0 2px 12px rgba(58,43,77,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Clear Sans','Helvetica Neue',Arial,sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.55}
h1,h2,h3,.serif{font-family:'Clear Sans','Helvetica Neue',Arial,sans-serif;font-weight:700;letter-spacing:.01em}
.script{font-family:'Dancing Script',cursive;font-weight:700;color:#111}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--violet-2);outline-offset:1px;border-color:var(--violet)}
textarea{min-height:90px;resize:vertical}
label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
#app{display:flex;min-height:100vh}
/* ── sidebar ── */
#sidebar{width:236px;background:#eef3ec;border-right:1px solid var(--line);color:var(--ink);padding:24px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
#sidebar .logo{display:flex;align-items:center;gap:10px;margin-bottom:22px;padding-left:4px}
#sidebar .logo img{width:44px;height:44px}
#sidebar .logo .script{font-size:27px;line-height:1}
#sidebar button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--sage-mid);padding:10px 12px;border-radius:10px;font-size:14px;font-weight:500}
#sidebar button:hover{background:#e0e9df;color:var(--sage-deep)}
#sidebar button.on{background:var(--sage);color:#243128;font-weight:700}
#sidebar .foot{margin-top:auto;font-size:11.5px;color:var(--muted);padding-left:10px}
main{flex:1;padding:28px 32px;max-width:1200px}
#mobileBar{display:none}
/* ── components ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{background:var(--violet);color:#fff;border:none;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:600}
.btn:hover{background:#6a4f94}
.btn.ghost{background:transparent;color:var(--violet);border:1px solid var(--violet)}
.btn.ghost:hover{background:var(--violet-soft)}
.btn.soft{background:var(--violet-soft);color:var(--plum)}
.btn.danger{background:var(--err-soft);color:var(--err)}
.btn.sm{padding:6px 11px;font-size:13px;border-radius:8px}
.badge{display:inline-block;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--violet-soft);color:var(--plum)}
.badge.ok{background:var(--ok-soft);color:var(--ok)}
.badge.warn{background:var(--warn-soft);color:var(--warn)}
.badge.err{background:var(--err-soft);color:var(--err)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tr:hover td{background:#fcfaf6}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.kpi .n{font-family:'Clear Sans',sans-serif;font-weight:700;font-size:28px;color:var(--sage-deep)}
.kpi .l{font-size:12.5px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0}
.tabs button{background:none;border:1px solid var(--line);padding:8px 14px;border-radius:20px;font-size:13.5px;color:var(--muted)}
.tabs button.on{background:var(--plum);color:#fff;border-color:var(--plum)}
.hint{font-size:12.5px;color:var(--muted)}
.sep{border:none;border-top:1px solid var(--line);margin:16px 0}
h1{font-size:27px;color:var(--plum);margin-bottom:4px}
h2{font-size:19px;color:var(--plum);margin-bottom:12px}
h3{font-size:16px;color:var(--plum);margin-bottom:8px}
.sub{color:var(--muted);font-size:14px;margin-bottom:20px}
.clickable{cursor:pointer;color:var(--violet);font-weight:600}
.check{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--ink)}
.check input{width:auto;accent-color:var(--violet)}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--plum);color:#fff;padding:11px 20px;border-radius:12px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:99;max-width:90vw}
#toast.err{background:var(--err)}
#toast.show{opacity:1}
.dropzone{border:2px dashed var(--violet-2);border-radius:var(--r);padding:18px;text-align:center;background:var(--violet-soft)}
.fiche-type{border-left:4px solid var(--violet);padding-left:10px}
@media(max-width:900px){
  #sidebar{display:none}
  #mobileBar{display:block;background:#eef3ec;border-bottom:1px solid var(--line);padding:10px 14px;position:sticky;top:0;z-index:10}
  #mobileBar .row{flex-wrap:nowrap}
  #mobileBar .logo{display:flex;align-items:center;gap:8px;white-space:nowrap}
  #mobileBar .logo img{width:30px;height:30px}
  #mobileBar .logo .script{font-size:21px}
  #mobileBar select{background:#fff}
  main{padding:18px 14px}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  table{display:block;overflow-x:auto;white-space:nowrap}
}
/* ── écran de connexion ── */
#lock{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,var(--sage-deep) 0%,var(--sage-mid) 55%,var(--sage) 130%);z-index:50}
#lock .box{background:var(--cream);border-radius:20px;padding:34px 30px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35)}
#lock .brand{font-family:'Dancing Script',cursive;font-weight:700;font-size:36px;color:#111;text-align:center}
#lock .brand img{width:64px;height:64px;display:block;margin:0 auto 6px}
#lock .tag{text-align:center;color:var(--muted);font-size:13px;margin:4px 0 22px}
#lock .msg{min-height:20px;font-size:13px;color:var(--err);text-align:center;margin-top:10px}
#lock .msg.ok{color:var(--ok)}
#lock .off{display:block;text-align:center;margin-top:14px;font-size:12.5px;color:var(--muted);background:none;border:none;text-decoration:underline;width:100%}
/* ── impression ── */
#printArea{display:none}
@media print{
  body>*{display:none!important}
  #printArea{display:block!important;font-family:'Clear Sans',sans-serif;color:#2b2f28}
  #printArea .ph{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #a8cbb7;padding-bottom:14px;margin-bottom:22px}
  #printArea .ph .brand{font-family:'Dancing Script',cursive;font-weight:700;font-size:30px;color:#111;display:flex;align-items:center;gap:10px}
  #printArea .ph .brand img{width:52px;height:52px}
  #printArea h1{font-family:'Clear Sans',sans-serif;font-weight:700;font-size:20px;color:#43584b;margin:0 0 12px}
  #printArea h2{font-family:'Clear Sans',sans-serif;font-weight:700;font-size:14.5px;color:#ab4210;margin:18px 0 6px}
  #printArea table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
  #printArea th{text-align:left;border-bottom:1.5px solid #43584b;padding:6px}
  #printArea td{border-bottom:1px solid #ddd;padding:6px}
  #printArea .pf{margin-top:30px;padding-top:12px;border-top:1px solid #ccc;font-size:10.5px;color:#777;text-align:center}
  #printArea p{white-space:pre-wrap;font-size:13.5px;line-height:1.6;margin:4px 0}
}
</style>
</head>
<body>
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="logo"><img class="logoimg" alt="Logo InspireB"><span class="script">InspireB</span></div>
    <button data-view="dash">◈ Tableau de bord</button>
    <button data-view="clients">❀ Clientes</button>
    <button data-view="ateliers">✿ Ateliers</button>
    <button data-view="cartes">🎁 Cartes cadeaux</button>
    <button data-view="caisse">€ Encaissements</button>
    <button data-view="catalogue">☰ Catalogue</button>
    <button data-view="imports">⇅ Imports</button>
    <button data-view="params">⚙ Réglages</button>
    <div class="foot">La beauté qui vient de l’intérieur<br><button data-act="logout" style="margin-top:10px;padding-left:0;color:var(--muted);font-size:12px;background:none;border:none;cursor:pointer">⎋ Se déconnecter</button></div>
  </aside>
  <div style="flex:1">
    <div id="mobileBar"><div class="row"><span class="logo"><img class="logoimg" alt=""><span class="script">InspireB</span></span>
      <select id="mobileNav">
        <option value="dash">Tableau de bord</option><option value="clients">Clientes</option>
        <option value="ateliers">Ateliers</option><option value="cartes">Cartes cadeaux</option>
        <option value="caisse">Encaissements</option><option value="catalogue">Catalogue</option>
        <option value="imports">Imports</option><option value="params">Réglages</option>
      </select></div></div>
    <main><div id="view"></div></main>
  </div>
</div>
<div id="lock">
  <form class="box" data-form="login">
    <div class="brand"><img class="logoimg" alt="">InspireB</div>
    <div class="tag">Espace de suivi client — accès protégé</div>
    <div style="margin-bottom:10px"><label>Compte GitHub (owner)</label><input name="owner" id="lockOwner" autocomplete="username" required></div>
    <div style="margin-bottom:10px"><label>Dépôt privé des données</label><input name="repo" id="lockRepo" placeholder="inspireb-donnees" required></div>
    <div style="margin-bottom:10px"><label>Jeton d’accès (fine-grained)</label><input type="password" name="token" id="lockToken" autocomplete="current-password" required></div>
    <details style="margin-bottom:12px"><summary class="hint" style="cursor:pointer">Avancé</summary>
      <div style="margin-top:8px"><label>Fichier de données</label><input name="path" id="lockPath" value="crm.json"></div></details>
    <label class="check" style="margin-bottom:14px"><input type="checkbox" name="remember"> Mémoriser le jeton sur cet appareil</label>
    <button class="btn" style="width:100%">Se connecter</button>
    <div class="msg" id="lockMsg"></div>
    <button type="button" class="off" data-act="offline">Continuer hors ligne (données de ce navigateur uniquement)</button>
  </form>
</div>
<div id="toast"></div>
<div id="printArea"></div>

<script>
/* ═════════ OUTILS ═════════ */
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=p=>p+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const eur=n=>(+n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR'});
const fdate=d=>{if(!d)return'—';const x=new Date(d);return isNaN(x)?'—':x.toLocaleDateString('fr-FR');};
const today=()=>new Date().toISOString().slice(0,10);
const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[’‘`]/g,"'").replace(/\s+/g,' ').trim();
const MODES=['Espèces','Carte bancaire','Virement','PayPal','Chèque','Carte cadeau','Autre'];
let toastT;function toast(msg,err){const t=$('#toast');t.textContent=msg;t.className=err?'err show':'show';clearTimeout(toastT);toastT=setTimeout(()=>t.className='',3200);}

/* Parseur CSV robuste (champs entre guillemets, virgules et retours ligne inclus) */
function parseCSV(text,sep){
  if(!sep){const l=text.slice(0,2000);sep=(l.split(';').length>l.split(',').length)?';':',';}
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===sep){row.push(cur);cur='';}
      else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;row.push(cur);cur='';if(row.some(x=>x.trim()!==''))rows.push(row);row=[];}
      else cur+=c;}}
  if(cur!==''||row.length){row.push(cur);if(row.some(x=>x.trim()!==''))rows.push(row);}
  return rows;
}
function telFR(t){let x=String(t||'').replace(/[^\d+]/g,'');if(x.startsWith('+33'))x='0'+x.slice(3);if(x.startsWith('33')&&x.length===11)x='0'+x.slice(2);if(x.length===10)return x.replace(/(\d{2})(?=\d)/g,'$1 ').trim();return t||'';}
function splitName(full){const parts=String(full||'').trim().split(/\s+/);if(parts.length<2)return{prenom:full||'',nom:''};
  const caps=parts.filter(p=>p.length>1&&p===p.toUpperCase());
  if(caps.length&&caps.length<parts.length)return{prenom:parts.filter(p=>!caps.includes(p)).join(' '),nom:caps.join(' ')};
  return{prenom:parts[0],nom:parts.slice(1).join(' ')};}

/* ═════════ DONNÉES ═════════ */
const SEED_SOINS=[
  {id:'s1',designation:'Massage Bien-être',categorie:'Massage',duree:60,prix:45},
  {id:'s2',designation:'Soin Visage',categorie:'Visage',duree:60,prix:55},
  {id:'s3',designation:'Soin visage + réflexologie',categorie:'Visage',duree:90,prix:75},
  {id:'s4',designation:'Réflexologie plantaire',categorie:'Réflexologie',duree:60,prix:65},
  {id:'s5',designation:'Naturopathie',categorie:'Naturopathie',duree:90,prix:0},
  {id:'s6',designation:'Conseil Beauté',categorie:'Conseil',duree:60,prix:0},
  {id:'s7',designation:'Soin Duo Séréni\u2019Baie',categorie:'Duo',duree:90,prix:110},
];
const DB_DEFAULT={v:3,clients:[],seances:[],ventes:[],fiches:[],factures:[],ateliers:[],cartes:[],soins:[],produits:[],settings:{ent:{nom:'InspireB — Betty Noël-Wourms',adresse:'',cp:'50530',ville:'Sartilly-Baie-Bocage',siret:'',email:'',tel:'',mention:'TVA non applicable, art. 293 B du CGI'},gh:{owner:'',repo:'',path:'crm.json',token:''}},counters:{cli:0,fac:0,carte:0}};
let db=structuredClone(DB_DEFAULT);
const store={get(k){try{return localStorage.getItem(k);}catch(e){return null;}},set(k,v){try{localStorage.setItem(k,v);return true;}catch(e){return false;}},del(k){try{localStorage.removeItem(k);}catch(e){}}};
function saveLocal(){db.settings.gh.token='';store.set('inspireb_db',JSON.stringify(db));setDirty(true);}
function loadLocal(){const raw=store.get('inspireb_db');if(raw){try{db=Object.assign(structuredClone(DB_DEFAULT),JSON.parse(raw));}catch(e){}}if(!db.soins.length)db.soins=structuredClone(SEED_SOINS);}
let dirty=false;function setDirty(d){dirty=d;const b=$('#syncBadge');if(b)b.style.display=d&&ghOK()?'inline-block':'none';}

const C={
  get:(id)=>db.clients.find(c=>c.id===id),
  byEmail:(e)=>{const x=norm(e);return x?db.clients.find(c=>norm(c.email)===x):null;},
  byName:(f)=>{const x=norm(f);return db.clients.find(c=>norm(c.prenom+' '+c.nom)===x||norm(c.nom+' '+c.prenom)===x);},
  name:(c)=>c?((c.prenom||'')+' '+(c.nom||'')).trim()||c.email||'—':'—',
  add(o){db.counters.cli++;const c=Object.assign({id:'CLI'+String(db.counters.cli).padStart(3,'0'),prenom:'',nom:'',email:'',tel:'',adresse:'',cp:'',ville:'',naissance:'',statut:'active',nuskin:false,jolimoi:false,newsletter:null,consentement:false,consentementDate:'',notes:'',questionnaire:[],createdAt:today()},o);db.clients.push(c);return c;}
};
function nextNum(pfx,cnt){db.counters[cnt]++;return pfx+'-'+new Date().getFullYear()+'-'+String(db.counters[cnt]).padStart(3,'0');}
function matchSoin(name){const n=norm(name);if(!n)return null;
  let m=db.soins.find(s=>norm(s.designation)===n);if(m)return m;
  m=db.soins.find(s=>norm(s.designation).includes(n)||n.includes(norm(s.designation)));if(m)return m;
  let best=null,bs=0;const w1=n.split(' ');
  db.soins.forEach(s=>{const w2=norm(s.designation).split(' ');const sc=w1.filter(w=>w.length>2&&w2.includes(w)).length;if(sc>bs){bs=sc;best=s;}});
  return bs>=2?best:null;}

/* ═════════ GITHUB ═════════ */
let ghToken='';
const sess={get(k){try{return sessionStorage.getItem(k);}catch(e){return null;}},set(k,v){try{sessionStorage.setItem(k,v);}catch(e){}},del(k){try{sessionStorage.removeItem(k);}catch(e){}}};
const ghOK=()=>{const g=db.settings.gh;return g.owner&&g.repo&&ghToken;};
const ghURL=()=>{const g=db.settings.gh;return`https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.path||'crm.json'}`;};
const ghH=()=>({'Authorization':'Bearer '+ghToken,'Accept':'application/vnd.github+json'});
function lockMsg(m,ok){const e=$('#lockMsg');if(e){e.textContent=m||'';e.className=ok?'msg ok':'msg';}}
function showLock(msg){$('#app').style.display='none';$('#lock').style.display='flex';
  const g=db.settings.gh;$('#lockOwner').value=g.owner||'';$('#lockRepo').value=g.repo||'';$('#lockPath').value=g.path||'crm.json';$('#lockToken').value='';lockMsg(msg||'');}
function unlock(){$('#lock').style.display='none';$('#app').style.display='flex';render();}
const b64enc=s=>btoa(String.fromCharCode(...new TextEncoder().encode(s)));
const b64dec=s=>new TextDecoder().decode(Uint8Array.from(atob(s.replace(/\n/g,'')),c=>c.charCodeAt(0)));
let ghSha=null;
async function ghLoad(){if(!ghOK())return{ok:false,msg:'GitHub non configuré'};
  try{const r=await fetch(ghURL(),{headers:ghH()});
    if(r.status===404)return{ok:true,empty:true};
    if(!r.ok)return{ok:false,msg:'GitHub : erreur '+r.status};
    const j=await r.json();ghSha=j.sha;
    const remote=JSON.parse(b64dec(j.content));
    const gh=db.settings.gh;db=Object.assign(structuredClone(DB_DEFAULT),remote);db.settings.gh=gh;
    if(!db.soins.length)db.soins=structuredClone(SEED_SOINS);
    store.set('inspireb_db',JSON.stringify(db));setDirty(false);return{ok:true};
  }catch(e){return{ok:false,msg:'Connexion GitHub impossible'};}}
async function ghSave(){if(!ghOK())return{ok:false,msg:'GitHub non configuré'};
  try{if(ghSha===null){const r0=await fetch(ghURL(),{headers:ghH()});if(r0.ok)ghSha=(await r0.json()).sha;}
    const clean=structuredClone(db);clean.settings.gh={owner:'',repo:'',path:db.settings.gh.path,token:''};
    const body={message:'Sauvegarde InspireB CRM '+new Date().toISOString(),content:b64enc(JSON.stringify(clean,null,1))};
    if(ghSha)body.sha=ghSha;
    const r=await fetch(ghURL(),{method:'PUT',headers:Object.assign({'Content-Type':'application/json'},ghH()),body:JSON.stringify(body)});
    if(!r.ok)return{ok:false,msg:'GitHub : erreur '+r.status+(r.status===409?' (conflit — rechargez d’abord)':'')};
    ghSha=(await r.json()).content.sha;setDirty(false);return{ok:true};
  }catch(e){return{ok:false,msg:'Connexion GitHub impossible'};}}

/* ═════════ ÉTAT & RENDU ═════════ */
let state={view:'dash',clientId:null,tab:'infos',search:'',caisseMois:today().slice(0,7),caisseMode:'',ficheEdit:null};
function render(){
  document.querySelectorAll('#sidebar button[data-view]').forEach(b=>b.classList.toggle('on',b.dataset.view===state.view));
  const mn=$('#mobileNav');if(mn)mn.value=state.view;

function encaissements(){
  const out=[];
  db.seances.forEach(s=>{if(!s.offert&&+s.montant>0)out.push({date:s.date,clientId:s.clientId,label:s.designation,type:'Séance',montant:+s.montant,mode:s.paiement||'—'});});
  db.ventes.forEach(v=>out.push({date:v.date,clientId:v.clientId,label:v.designation+(v.qte>1?' ×'+v.qte:''),type:'Produit',montant:+v.montant,mode:v.paiement||'—'}));
  db.cartes.forEach(cc=>out.push({date:cc.dateEmission,clientId:cc.acheteuseId,label:'Carte cadeau '+cc.num,type:'Carte cadeau',montant:+cc.montant,mode:cc.paiement||'—',free:cc.acheteuseNom}));
  db.ateliers.forEach(a=>(a.participants||[]).forEach(p=>{if(+p.montant>0)out.push({date:a.date,clientId:p.clientId,label:'Atelier — '+a.titre,type:'Atelier',montant:+p.montant,mode:p.paiement||'—',free:p.nom});}));
  return out.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}
function viewDash(){
  const mois=today().slice(0,7);const enc=encaissements();
  const caMois=enc.filter(e=>(e.date||'').startsWith(mois)).reduce((s,e)=>s+e.montant,0);
  const seancesMois=db.seances.filter(s=>(s.date||'').startsWith(mois)).length;
  const soldes=db.cartes.reduce((s,cc)=>s+Math.max(0,+cc.montant-(cc.utilisations||[]).reduce((x,u)=>x+ +u.montant,0)),0);
  const last=enc.slice(0,8);
  return`<h1>Bonjour Betty <span style="color:var(--gold)">✦</span></h1><p class="sub">${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
  <div class="grid4">
    <div class="kpi"><div class="n">${db.clients.filter(c=>c.statut!=='inactive').length}</div><div class="l">Clientes actives</div></div>
    <div class="kpi"><div class="n">${eur(caMois)}</div><div class="l">Encaissé ce mois-ci</div></div>
    <div class="kpi"><div class="n">${seancesMois}</div><div class="l">Séances ce mois-ci</div></div>
    <div class="kpi"><div class="n">${eur(soldes)}</div><div class="l">Cartes cadeaux en circulation</div></div>
  </div>
  <div class="card" style="margin-top:18px"><h2>Derniers encaissements</h2>
  ${last.length?`<table><thead><tr><th>Date</th><th>Cliente</th><th>Détail</th><th>Mode</th><th style="text-align:right">Montant</th></tr></thead><tbody>
  ${last.map(e=>`<tr><td>${fdate(e.date)}</td><td>${esc(e.clientId?C.name(C.get(e.clientId)):(e.free||'—'))}</td><td>${esc(e.label)}<br><span class="hint">${e.type}</span></td><td>${esc(e.mode)}</td><td style="text-align:right">${eur(e.montant)}</td></tr>`).join('')}</tbody></table>`
  :'<p class="hint">Aucun encaissement pour l’instant. Ajoutez une séance ou importez vos rendez-vous Setmore.</p>'}</div>`;
}

function viewCaisse(){
  const enc=encaissements().filter(e=>(!state.caisseMois||(e.date||'').startsWith(state.caisseMois))&&(!state.caisseMode||e.mode===state.caisseMode));
  const total=enc.reduce((s,e)=>s+e.montant,0);
  const parMode={};enc.forEach(e=>parMode[e.mode]=(parMode[e.mode]||0)+e.montant);
  return`<h1>Encaissements</h1><p class="sub">Traçabilité de tous les paiements : séances, produits, cartes cadeaux, ateliers</p>
  <div class="card"><div class="row">
    <div><label>Mois</label><input type="month" id="caisseMois" value="${state.caisseMois}"></div>
    <div><label>Mode de paiement</label><select id="caisseMode"><option value="">Tous</option>${MODES.map(m=>`<option ${state.caisseMode===m?'selected':''}>${m}</option>`).join('')}</select></div>
    <div style="margin-left:auto;text-align:right"><div class="hint">Total période</div><div class="serif" style="font-size:26px;color:var(--plum)">${eur(total)}</div></div></div>
  <div class="row" style="margin-top:10px">${Object.entries(parMode).map(([m,v])=>`<span class="badge">${esc(m)} · ${eur(v)}</span>`).join(' ')||''}</div></div>

  ${enc.map(e=>`<tr><td>${fdate(e.date)}</td><td>${esc(e.clientId?C.name(C.get(e.clientId)):(e.free||'—'))}</td><td>${esc(e.label)}</td><td>${e.type}</td><td>${esc(e.mode)}</td><td style="text-align:right">${eur(e.montant)}</td></tr>`).join('')}</tbody></table>`

}

function logImport(html){const l=$('#importLog');if(l)l.innerHTML=`<div class="card"><h2>Résultat</h2>${html}</div>`;}
function headerIndex(head,names){const h=head.map(x=>norm(x));for(const n of names){const i=h.findIndex(x=>x.includes(norm(n)));if(i>=0)return i;}return -1;}

async function importContacts(file){
  const rows=parseCSV(await file.text());if(rows.length<2)return toast('Fichier vide ou illisible',true);
  const head=rows[0];
  const iN=headerIndex(head,['name','nom']),iE=headerIndex(head,['email','e-mail','mail']),iT=headerIndex(head,['phone','téléphone','telephone','mobile']),iA=headerIndex(head,['address','adresse']);
  if(iE<0&&iN<0)return toast('Colonnes Name/Email introuvables',true);
  let crees=0,maj=0;
  rows.slice(1).forEach(r=>{
    const email=iE>=0?r[iE]?.trim():'';const nomC=iN>=0?r[iN]?.trim():'';
    if(!email&&!nomC)return;
    let c=(email&&C.byEmail(email))||C.byName(nomC);
    const{prenom,nom}=splitName(nomC);
    if(c){if(email&&!c.email)c.email=email;if(iT>=0&&r[iT]&&!c.tel)c.tel=telFR(r[iT]);if(iA>=0&&r[iA]&&!c.adresse)c.adresse=r[iA].trim();maj++;}
    else{C.add({prenom,nom,email,tel:iT>=0?telFR(r[iT]):'',adresse:iA>=0?(r[iA]||'').trim():''});crees++;}
  });
  saveLocal();render();logImport(`<p>${crees} cliente(s) créée(s), ${maj} fiche(s) complétée(s).</p>`);toast('Contacts importés');
}
async function importRdv(file){
  try{
    const wb=XLSX.read(await file.arrayBuffer(),{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
    if(rows.length<2)return toast('Fichier vide',true);
    let hi=rows.findIndex(r=>r.some(x=>/customer|client/i.test(x)));if(hi<0)hi=0;
    const head=rows[hi];
    const iC=headerIndex(head,['customer','client','nom']),iE=headerIndex(head,['email','e-mail']),
          iS=headerIndex(head,['service','soin']),iD=headerIndex(head,['date']),
          iP=headerIndex(head,['price','cost','prix','montant']),iM=headerIndex(head,['meeting type','type']);
    if(iC<0||iD<0)return toast('Colonnes Customer/Date introuvables — envoyez-moi un aperçu du fichier',true);
    const MOIS={jan:0,feb:1,fev:1,mar:2,apr:3,avr:3,may:4,mai:4,jun:5,jui:6,jul:6,aug:7,aou:7,sep:8,oct:9,nov:10,dec:11};
    const pDate=v=>{if(!v)return'';const m=String(v).match(/(\d{1,2})\s+([A-Za-zéû]{3,})\.?\s+(\d{4})/);
      if(m){const mo=MOIS[norm(m[2]).slice(0,3)];if(mo!==undefined)return new Date(Date.UTC(+m[3],mo,+m[1],12)).toISOString().slice(0,10);}
      const d=new Date(v);return isNaN(d)?'':new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate(),12)).toISOString().slice(0,10);};
    let ajoutes=0,doublons=0,ignores=0,clientsCrees=0;
    rows.slice(hi+1).forEach(r=>{
      const svc=iS>=0?String(r[iS]||'').trim():'';const cust=String(r[iC]||'').trim();
      if(!cust||!svc||/^n\/?a$/i.test(svc)){ignores++;return;}
      if(iM>=0&&/personal|perso|bloc/i.test(String(r[iM]||''))){ignores++;return;}
      const date=pDate(r[iD]);if(!date){ignores++;return;}
      const email=iE>=0?String(r[iE]||'').trim():'';
      let c=(email&&C.byEmail(email))||C.byName(cust);
      if(!c){const{prenom,nom}=splitName(cust);c=C.add({prenom,nom,email});clientsCrees++;}
      const soin=matchSoin(svc);const designation=soin?soin.designation:svc;
      const key=c.id+'|'+date+'|'+norm(designation);
      if(db.seances.some(s=>s.clientId+'|'+s.date+'|'+norm(s.designation)===key)){doublons++;return;}
      const prix=iP>=0?parseFloat(String(r[iP]).replace(/[^\d.,]/g,'').replace(',','.'))||0:(soin?soin.prix:0);
      db.seances.push({id:uid('se'),clientId:c.id,date,soinId:soin?soin.id:'',designation,duree:soin?soin.duree:'',montant:prix,paiement:'',offert:false,notes:'Import Setmore'});
      ajoutes++;
    });
    saveLocal();render();
    logImport(`<p>${ajoutes} séance(s) ajoutée(s) · ${doublons} doublon(s) ignoré(s) · ${ignores} ligne(s) hors soin · ${clientsCrees} cliente(s) créée(s).</p><p class="hint">Pensez à renseigner le mode de paiement des séances importées pour une traçabilité complète.</p>`);
    toast('Rendez-vous importés');
  }catch(e){toast('Lecture du fichier impossible : '+e.message,true);}
}
async function importForms(file){
  const rows=parseCSV(await file.text());if(rows.length<2)return toast('Fichier vide',true);
  const head=rows[0];
  const iE=head.findIndex(h=>/mail/i.test(h));
  if(iE<0)return toast('Aucune colonne email détectée dans le formulaire',true);
  let lies=0,orphelins=0;
  rows.slice(1).forEach(r=>{
    const email=(r[iE]||'').trim();if(!email)return;
    const c=C.byEmail(email);
    if(!c){orphelins++;return;}
    c.questionnaire=head.map((q,i)=>({q,r:r[i]||'',i})).filter(x=>x.i!==0&&x.i!==iE&&x.r.trim()!=='').map(({q,r})=>({q,r}));
    c.questionnaireDate=today();lies++;
  });
  saveLocal();render();logImport(`<p>${lies} questionnaire(s) rattaché(s) · ${orphelins} réponse(s) sans fiche cliente correspondante (créez la cliente puis ré-importez).</p>`);toast('Questionnaires importés');
}
async function importML(file){
  const rows=parseCSV(await file.text());if(rows.length<2)return toast('Fichier vide',true);
  const head=rows[0];
  const iE=headerIndex(head,['email']);
  const iS=headerIndex(head,['status','statut','état']);
  const iD=headerIndex(head,['subscribe','date d','opt-in','created']);
  const iG=headerIndex(head,['group','groupe']);
  if(iE<0)return toast('Colonne Email introuvable dans l’export MailerLite',true);
  let maj=0,inconnues=0;
  rows.slice(1).forEach(r=>{
    const email=(r[iE]||'').trim();if(!email)return;
    const c=C.byEmail(email);
    if(!c){inconnues++;return;}
    const st=iS>=0?norm(r[iS]):'active';
    c.newsletter={abonnee:/activ|abonn|subscrib/.test(st)&&!/unsub|desabon|désabon/.test(st),
      statut:iS>=0?r[iS]:'active',date:iD>=0?(r[iD]||'').slice(0,10):'',groupes:iG>=0?(r[iG]||''):''};
    maj++;
  });
  saveLocal();render();logImport(`<p>${maj} fiche(s) mise(s) à jour avec le statut newsletter · ${inconnues} abonnée(s) sans fiche cliente (normal si elles ne sont pas encore clientes).</p>`);toast('Statuts newsletter importés');
}

function printHead(){const e=db.settings.ent;
  return`<div class="ph"><div><div class="brand"><img src="${LOGO}" alt="">InspireB</div><div style="font-size:11px;color:#78806f">La beauté qui vient de l’intérieur</div></div>
  <div style="text-align:right;font-size:12px">${esc(e.nom)}<br>${esc(e.adresse)}${e.adresse?'<br>':''}${esc(e.cp)} ${esc(e.ville)}<br>${esc(e.email)}${e.email&&e.tel?' · ':''}${esc(e.tel)}${e.siret?'<br>SIRET '+esc(e.siret):''}</div></div>`;}
function doPrint(html){$('#printArea').innerHTML=html;setTimeout(()=>window.print(),80);}
function printFiche(f){
  const c=C.get(f.clientId);
  doPrint(`${printHead()}<h1>${ficheLabel(f.type)} — ${esc(f.titre)}</h1>
  <p style="font-size:12.5px;color:#555">Pour ${esc(C.name(c))} · le ${fdate(f.date)}</p>
  ${f.sections.filter(s=>s.texte.trim()).map(s=>`<h2>${esc(s.titre)}</h2><p>${esc(s.texte)}</p>`).join('')}
  <div class="pf">${f.type==='conseils'?'Ces conseils relèvent du bien-être et de l’hygiène de vie. Ils ne se substituent en aucun cas à un avis, un diagnostic ou un traitement médical.<br>':''}${esc(db.settings.ent.nom)} — document confidentiel remis à la cliente</div>`);
}
function printFacture(f){
  const c=C.get(f.clientId);const e=db.settings.ent;
  doPrint(`${printHead()}<h1>Facture ${esc(f.num)}</h1>
  <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px">
    <div>Date : ${fdate(f.date)}<br>Statut : ${f.payee?'réglée ('+esc(f.paiement)+')':'en attente de règlement'}</div>
    <div style="text-align:right"><strong>Facturée à</strong><br>${esc(C.name(c))}<br>${esc(c?.adresse||'')}${c?.adresse?'<br>':''}${esc(c?.cp||'')} ${esc(c?.ville||'')}</div></div>
  <table><thead><tr><th>Désignation</th><th style="text-align:right">Montant</th></tr></thead><tbody>
  ${f.lignes.map(l=>`<tr><td>${esc(l.designation)}</td><td style="text-align:right">${eur(l.montant)}</td></tr>`).join('')}
  <tr><td style="text-align:right;font-weight:600">Total</td><td style="text-align:right;font-weight:600">${eur(f.total)}</td></tr></tbody></table>
  <p style="font-size:11.5px;color:#555">${esc(e.mention)}</p>
  <div class="pf">${esc(e.nom)}${e.siret?' — SIRET '+esc(e.siret):''} — ${esc(e.cp)} ${esc(e.ville)}</div>`);
}
function printCarte(cc){
  doPrint(`${printHead()}<h1 style="text-align:center;margin-top:30px">Carte cadeau ✦ ${eur(cc.montant)}</h1>
  <p style="text-align:center;font-size:14px">Offerte à <strong>${esc(cc.beneficiaire||'…')}</strong></p>
  <p style="text-align:center;font-size:12.5px;color:#555">N° ${esc(cc.num)} · émise le ${fdate(cc.dateEmission)} · valable jusqu’au ${fdate(cc.validite)}</p>
  <p style="text-align:center;font-size:12.5px;margin-top:18px">À utiliser sur les soins et prestations InspireB, sur rendez-vous.</p>
  <div class="pf">${esc(db.settings.ent.nom)} — ${esc(db.settings.ent.cp)} ${esc(db.settings.ent.ville)}</div>`);
}

document.addEventListener('click',async(e)=>{
  const nav=e.target.closest('#sidebar button[data-view]');
  if(nav){state.view=nav.dataset.view;state.clientId=null;state.ficheEdit=null;render();return;}
  const el=e.target.closest('[data-act]');if(!el)return;
  const act=el.dataset.act,id=el.dataset.id;
  const A={
    newClient(){const c=C.add({});saveLocal();state.clientId=c.id;state.tab='infos';render();},
    openClient(){state.clientId=id;state.tab='infos';state.ficheEdit=null;render();},
    backClients(){state.clientId=null;state.ficheEdit=null;render();},
    tab(){state.tab=el.dataset.tab;state.ficheEdit=null;render();},
    delClient(){const c=C.get(id);if(!confirm(`Supprimer définitivement ${C.name(c)} et TOUT son historique (séances, ventes, fiches, factures) ? Cette action répond au droit à l’effacement et est irréversible.`))return;
      db.clients=db.clients.filter(x=>x.id!==id);['seances','ventes','fiches','factures'].forEach(k=>db[k]=db[k].filter(x=>x.clientId!==id));
      db.ateliers.forEach(a=>a.participants=(a.participants||[]).filter(p=>p.clientId!==id));
      saveLocal();state.clientId=null;render();toast('Fiche supprimée définitivement');},
    rgpdExport(){const c=C.get(id);const data={cliente:c,seances:db.seances.filter(s=>s.clientId===id),ventes:db.ventes.filter(v=>v.clientId===id),fiches:db.fiches.filter(f=>f.clientId===id),factures:db.factures.filter(f=>f.clientId===id)};
      const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download=`donnees-${norm(C.name(c)).replace(/ /g,'-')}.json`;a.click();toast('Données de la cliente exportées');},
    delSeance(){db.seances=db.seances.filter(s=>s.id!==id);saveLocal();render();},
    delVente(){db.ventes=db.ventes.filter(v=>v.id!==id);saveLocal();render();},
    newFiche(){const type=el.dataset.type;const c=C.get(el.dataset.id);
      const f={id:uid('f'),clientId:c.id,type,date:today(),titre:ficheLabel(type).replace('Fiche de ','')+' du '+new Date().toLocaleDateString('fr-FR'),sections:FICHE_TPL[type].map(([titre,texte])=>({titre,texte}))};
      db.fiches.push(f);saveLocal();state.ficheEdit=f.id;render();},
    editFiche(){state.ficheEdit=id;render();},
    closeFiche(){state.ficheEdit=null;render();},
    delFiche(){if(confirm('Supprimer cette fiche ?')){db.fiches=db.fiches.filter(f=>f.id!==id);state.ficheEdit=null;saveLocal();render();}},
    printFiche(){const f=db.fiches.find(x=>x.id===id);if(f)printFiche(f);},
    printFacture(){const f=db.factures.find(x=>x.id===id);if(f)printFacture(f);},
    payFacture(){const f=db.factures.find(x=>x.id===id);if(f){const m=prompt('Mode de paiement ?\n'+MODES.join(' · '),'Carte bancaire');if(m){f.payee=true;f.paiement=m;saveLocal();render();}}},
    delFacture(){if(confirm('Supprimer cette facture ? (attention à la continuité de votre numérotation)')){db.factures=db.factures.filter(f=>f.id!==id);saveLocal();render();}},
    delAtelier(){if(confirm('Supprimer cet atelier et ses participations ?')){db.ateliers=db.ateliers.filter(a=>a.id!==id);saveLocal();render();}},
    delPart(){const a=db.ateliers.find(x=>x.id===id);if(a){a.participants.splice(+el.dataset.i,1);saveLocal();render();}},
    printCarte(){const cc=db.cartes.find(x=>x.id===id);if(cc)printCarte(cc);},
    delCarte(){if(confirm('Supprimer cette carte cadeau ?')){db.cartes=db.cartes.filter(x=>x.id!==id);saveLocal();render();}},
    delSoin(){db.soins=db.soins.filter(s=>s.id!==id);saveLocal();render();},
    delProduit(){db.produits=db.produits.filter(p=>p.id!==id);saveLocal();render();},
    exportCaisse(){const enc=encaissements().filter(x=>(!state.caisseMois||(x.date||'').startsWith(state.caisseMois))&&(!state.caisseMode||x.mode===state.caisseMode));
      const csv='Date;Cliente;Détail;Type;Mode;Montant\n'+enc.map(x=>[x.date,x.clientId?C.name(C.get(x.clientId)):(x.free||''),x.label,x.type,x.mode,String(x.montant).replace('.',',')].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';')).join('\n');
      const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download=`encaissements-${state.caisseMois||'tous'}.csv`;a.click();},
    async ghPull(){toast('Chargement depuis GitHub…');const r=await ghLoad();toast(r.ok?(r.empty?'Aucune donnée sur GitHub pour l’instant':'Données chargées depuis GitHub'):r.msg,!r.ok);if(r.ok)render();},
    async ghPush(){toast('Envoi vers GitHub…');const r=await ghSave();toast(r.ok?'Données envoyées vers GitHub':r.msg,!r.ok);render();},
    exportJson(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download=`inspireb-crm-${today()}.json`;a.click();},
    logout(){if(!confirm('Se déconnecter ? Le jeton sera retiré de cet appareil. Vos données restent en sécurité sur GitHub.'))return;
      ghToken='';store.del('inspireb_token');sess.del('inspireb_token');ghSha=null;showLock('');},
    goLogin(){showLock('');},
    offline(){unlock();toast('Mode hors ligne — pensez à exporter une sauvegarde régulièrement');},
    resetAll(){if(confirm('Effacer TOUTES les données de ce navigateur ? Exportez une sauvegarde avant.')){db=structuredClone(DB_DEFAULT);db.soins=structuredClone(SEED_SOINS);store.del('inspireb_db');state.clientId=null;render();toast('Données réinitialisées');}},
  };
  if(A[act]){e.preventDefault();await A[act]();}
});

document.addEventListener('submit',(e)=>{
  const f=e.target.closest('[data-form]');if(!f)return;e.preventDefault();
  const d=Object.fromEntries(new FormData(f).entries());const id=f.dataset.id;
  const F={
    saveClient(){const c=C.get(id);Object.assign(c,{prenom:d.prenom,nom:d.nom,naissance:d.naissance,email:d.email,tel:d.tel,statut:d.statut,adresse:d.adresse,cp:d.cp,ville:d.ville,notes:d.notes,nuskin:!!d.nuskin,jolimoi:!!d.jolimoi});
      if(d.consentement&&!c.consentement)c.consentementDate=today();c.consentement=!!d.consentement;
      saveLocal();render();toast('Fiche enregistrée');},
    addSeance(){const soin=db.soins.find(s=>s.id===d.soinId);
      db.seances.push({id:uid('se'),clientId:id,date:d.date,soinId:d.soinId,designation:soin?soin.designation:'Soin',duree:soin?soin.duree:'',montant:d.offert?0:+d.montant||0,paiement:d.offert?'':d.paiement,offert:!!d.offert,notes:d.notes||''});
      saveLocal();render();toast('Séance ajoutée');},
    addVente(){db.ventes.push({id:uid('v'),clientId:id,date:d.date,designation:d.designation,marque:d.marque||'',qte:+d.qte||1,montant:+d.montant||0,paiement:d.paiement});
      if(d.designation&&!db.produits.some(p=>norm(p.designation)===norm(d.designation)))db.produits.push({id:uid('p'),designation:d.designation,marque:d.marque||'',prix:+d.montant/(+d.qte||1)});
      saveLocal();render();toast('Achat enregistré');},
    saveFiche(){const fi=db.fiches.find(x=>x.id===id);if(!fi)return;fi.titre=d.titre;fi.date=d.date;
      fi.sections.forEach((s,i)=>s.texte=d['sec'+i]??s.texte);saveLocal();render();toast('Fiche enregistrée');},
    addFacture(){const c=C.get(id);const lignes=[];
      f.querySelectorAll('input[name="item"]:checked').forEach(cb=>{const k=cb.value;
        if(k[0]==='S'){const s=db.seances.find(x=>'S'+x.id===k);if(s)lignes.push({designation:fdate(s.date)+' — '+s.designation,montant:+s.montant});}
        else{const v=db.ventes.find(x=>'V'+x.id===k);if(v)lignes.push({designation:fdate(v.date)+' — '+v.designation+(v.qte>1?' ×'+v.qte:''),montant:+v.montant});}});
      if(d.libre&&+d.libreMontant)lignes.push({designation:d.libre,montant:+d.libreMontant});
      if(!lignes.length)return toast('Sélectionnez au moins un élément à facturer',true);
      const fac={id:uid('fa'),num:nextNum('FAC','fac'),clientId:id,date:today(),lignes,total:lignes.reduce((s,l)=>s+l.montant,0),payee:!!d.payee,paiement:d.payee?d.paiement:''};
      db.factures.push(fac);saveLocal();render();toast('Facture '+fac.num+' générée');},
    addAtelier(){db.ateliers.push({id:uid('a'),date:d.date,titre:d.titre,lieu:d.lieu||'',tarif:+d.tarif||0,participants:[]});saveLocal();render();toast('Atelier créé');},
    addPart(){const a=db.ateliers.find(x=>x.id===id);if(!a)return;
      if(!d.clientId&&!d.nom)return toast('Choisissez une cliente ou saisissez un nom',true);
      a.participants.push({clientId:d.clientId||'',nom:d.nom||'',montant:+d.montant||0,paiement:d.paiement});saveLocal();render();toast('Participation ajoutée');},
    addCarte(){db.cartes.push({id:uid('cc'),num:nextNum('CC','carte'),dateEmission:d.dateEmission,montant:+d.montant||0,acheteuseId:d.acheteuseId||'',acheteuseNom:d.acheteuseNom||'',beneficiaire:d.beneficiaire||'',paiement:d.paiement,validite:d.validite,utilisations:[]});
      saveLocal();render();toast('Carte cadeau émise');},
    useCarte(){const cc=db.cartes.find(x=>x.id===id);if(!cc)return;
      const m=+d.montant||0;if(m<=0)return;if(m>carteSolde(cc))return toast('Montant supérieur au solde restant',true);
      cc.utilisations.push({date:d.date,montant:m,note:d.note||''});saveLocal();render();toast('Utilisation enregistrée — solde : '+eur(carteSolde(cc)));},
    addSoin(){db.soins.push({id:uid('s'),designation:d.designation,categorie:d.categorie||'',duree:+d.duree||60,prix:+d.prix||0});saveLocal();render();},
    addProduit(){db.produits.push({id:uid('p'),designation:d.designation,marque:d.marque||'',prix:+d.prix||0});saveLocal();render();},
    saveEnt(){Object.assign(db.settings.ent,d);saveLocal();render();toast('Informations enregistrées');},
    async login(){
      db.settings.gh.owner=(d.owner||'').trim();db.settings.gh.repo=(d.repo||'').trim();db.settings.gh.path=(d.path||'crm.json').trim();
      ghToken=(d.token||'').trim();ghSha=null;
      if(!ghOK())return lockMsg('Renseignez le compte, le dépôt et le jeton.');
      lockMsg('Connexion en cours…',true);
      const r=await ghLoad();
      if(!r.ok){ghToken='';return lockMsg(r.msg+' — vérifiez le nom du dépôt et le jeton.');}
      if(d.remember)store.set('inspireb_token',ghToken);else{store.del('inspireb_token');sess.set('inspireb_token',ghToken);}
      saveLocal();setDirty(false);
      if(r.empty){const s=await ghSave();unlock();toast(s.ok?'Dépôt initialisé — fichier '+db.settings.gh.path+' créé':s.msg,!s.ok);}
      else{unlock();toast('Bonjour Betty ✦ données chargées');}
    },
  };
  if(F[f.dataset.form])F[f.dataset.form]();
});

document.addEventListener('change',async(e)=>{
  if(e.target.id==='mobileNav'){state.view=e.target.value;state.clientId=null;render();return;}
  if(e.target.id==='caisseMois'){state.caisseMois=e.target.value;render();return;}
  if(e.target.id==='caisseMode'){state.caisseMode=e.target.value;render();return;}
  const el=e.target.closest('[data-act]');if(!el)return;
  const act=el.dataset.act;
  if(act==='soinPick'){const s=db.soins.find(x=>x.id===el.value);const m=$('#seanceMontant');if(m&&s)m.value=s.prix;return;}
  const file=el.files&&el.files[0];if(!file)return;
  toast('Lecture du fichier…');
  if(act==='fileContacts')importContacts(file);
  if(act==='fileRdv')importRdv(file);
  if(act==='fileForms')importForms(file);
  if(act==='fileML')importML(file);
  if(act==='importJson'){try{const data=JSON.parse(await file.text());db=Object.assign(structuredClone(DB_DEFAULT),data);if(!db.soins.length)db.soins=structuredClone(SEED_SOINS);saveLocal();render();toast('Sauvegarde restaurée');}catch(err){toast('Fichier JSON invalide',true);}}
  el.value='';
});

document.addEventListener('input',(e)=>{
  if(e.target.id==='searchClient'){state.search=e.target.value;const pos=e.target.selectionStart;
    $('#view').innerHTML=viewClients();const inp=$('#searchClient');if(inp){inp.focus();inp.setSelectionRange(pos,pos);}}
});

/* ═════════ DÉMARRAGE ═════════ */
(async function init(){
  document.querySelectorAll('.logoimg').forEach(i=>i.src=LOGO);
  loadLocal();
  ghToken=store.get('inspireb_token')||sess.get('inspireb_token')||'';
  if(ghOK()){
    lockMsg('');
    const r=await ghLoad();
    if(r.ok){unlock();if(r.empty)toast('Dépôt vide — vos données locales seront envoyées au premier « Envoyer vers GitHub »');}
    else showLock(r.msg+' — reconnectez-vous.');
  }else showLock('');
})();
</script>
